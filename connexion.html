<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE DARKNESS ZONE · Connexion</title>
  <meta name="description" content="Connectez votre numéro WhatsApp à THE DARKNESS ZONE – authentification par code, interface jaune/noir.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========== VARIABLES (thème clair par défaut) ========== */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #111111;
      --text-secondary: #4a4a4a;
      --accent: #f5b042;
      --accent-dark: #e09d2a;
      --border: #e9ecef;
      --card-bg: #ffffff;
      --shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.dark {
      --bg-primary: #0a0a0a;
      --bg-secondary: #121212;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --border: #2a2a2a;
      --card-bg: #1a1a1a;
      --shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      transition: var(--transition);
      min-height: 100vh;
    }

    /* ========== SWITCH THEME ========== */
    .theme-switch {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 0.5rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .theme-switch:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }
    .theme-switch svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: var(--text-primary);
      stroke-width: 2;
      transition: var(--transition);
    }
    body.dark .theme-switch .sun-icon { display: none; }
    body:not(.dark) .theme-switch .moon-icon { display: none; }

    /* ========== NAVIGATION ========== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      transition: var(--transition);
    }
    .nav-links a:hover {
      color: var(--accent);
    }
    .btn-outline {
      padding: 0.5rem 1.2rem;
      border: 2px solid var(--accent);
      border-radius: 40px;
      background: transparent;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline:hover {
      background: var(--accent);
      color: #111;
    }

    /* ========== SECTION CONNEXION ========== */
    .connect-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2rem;
      box-shadow: var(--shadow);
      max-width: 550px;
      width: 100%;
      transition: var(--transition);
    }
    .glass-card:hover {
      transform: translateY(-6px);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.85rem;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 60px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(245, 176, 66, 0.2);
    }
    button {
      background: var(--accent);
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #111;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }
    button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }
    .code-result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 24px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .code-number {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 6px;
      color: var(--accent);
      word-break: break-all;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      width: auto;
      margin-top: 12px;
    }
    .copy-btn:hover {
      background: var(--accent);
      color: #111;
    }
    .loader {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-msg {
      color: #e74c3c;
      margin-top: 1rem;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
      margin-top: 2rem;
    }

    @media (max-width: 700px) {
      .nav-links {
        gap: 1rem;
      }
      .glass-card {
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .code-number {
        font-size: 1.8rem;
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="theme-switch" id="themeToggle">
    <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </div>

  <nav>
    <div class="logo">DARKNESS ZONE</div>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="index.html#features">Fonctions</a>
      <a href="connexion.html" style="color: var(--accent);">Connexion</a>
    </div>
    <div class="nav-actions">
      <a href="index.html" class="btn-outline">Retour</a>
    </div>
  </nav>

  <section class="connect-section">
    <div class="glass-card">
      <h1>Activer ton bot</h1>
      <p class="sub">Entre ton numéro WhatsApp avec indicatif pays (ex: 237671410035)</p>
      <div class="input-group">
        <label>Numéro WhatsApp</label>
        <input type="tel" id="phoneNumber" placeholder="237671410035" maxlength="15">
      </div>
      <button id="generateBtn">Générer le code d'appairage</button>
      <div id="resultArea"></div>
    </div>
  </section>

  <footer>
    <p>© 2025 THE DARKNESS ZONE — Connexion sécurisée</p>
  </footer>

  <script>
    // ========== THÈME ==========
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    if (localStorage.getItem('darkness-zone-theme') === 'dark') {
      body.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      localStorage.setItem('darkness-zone-theme', body.classList.contains('dark') ? 'dark' : 'light');
    });

    // ========== PAIRING ==========
    // ⚠️ REMPLACER PAR L'URL DE VOTRE BACKEND (ex: http://95.111.252.213:19112)
    const API_BASE_URL = 'https://ton-backend.xyz';

    const generateBtn = document.getElementById('generateBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const resultArea = document.getElementById('resultArea');

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ Code copié dans le presse-papier');
      }).catch(() => {
        alert('❌ Impossible de copier');
      });
    }

    generateBtn.addEventListener('click', async () => {
      let rawNumber = phoneInput.value.trim();
      const cleanNumber = rawNumber.replace(/\D/g, '');
      if (cleanNumber.length < 8) {
        resultArea.innerHTML = `<div class="error-msg">❌ Numéro invalide (ex: 237671410035)</div>`;
        return;
      }

      resultArea.innerHTML = `<div class="code-result"><div class="loader"></div> Génération en cours...</div>`;

      try {
        const response = await fetch(`${API_BASE_URL}/pair?number=${cleanNumber}`);
        const data = await response.json();
        if (data.code) {
          const code = data.code;
          resultArea.innerHTML = `
            <div class="code-result">
              <div>✅ Code d'appairage (valable 2 minutes)</div>
              <div class="code-number">${code}</div>
              <button class="copy-btn" id="copyCodeBtn">📋 Copier le code</button>
              <div style="font-size:0.8rem; margin-top:0.8rem;">
                Sur WhatsApp, la notification apparaîtra avec le nom <strong>DARKNESS ZONE</strong>.
              </div>
            </div>
          `;
          document.getElementById('copyCodeBtn')?.addEventListener('click', () => copyToClipboard(code));
        } else {
          resultArea.innerHTML = `<div class="error-msg">❌ Erreur : ${data.error || 'Réponse invalide'}</div>`;
        }
      } catch (err) {
        console.error(err);
        resultArea.innerHTML = `<div class="error-msg">❌ Impossible de joindre le serveur. Vérifiez que le backend est actif.</div>`;
      }
    });
  </script>
</body>
</html>
